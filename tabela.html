<!DOCTYPE html>
<html>
<head>
    <title>Formulário de Identidade</title>
</head>
<body>

<h2>Formulário de Identidade Pessoal</h2>

<form>

<fieldset>
<legend>Dados Pessoais</legend>

Nome Completo: <input type="text" name="nome"><br><br>

Data de Nascimento: <input type="date" name="data"><br><br>

Sexo:
<input type="radio" name="sexo" value="M"> Masculino
<input type="radio" name="sexo" value="F"> Feminino<br><br>

Nacionalidade: <input type="text" name="nacionalidade"><br><br>

</fieldset>

<br>

<fieldset>
<legend>Contato</legend>

Email: <input type="email" name="email"><br><br>

Telefone: <input type="tel" name="telefone"><br><br>

Endereço: <br>
<textarea name="endereco" rows="4" cols="30"></textarea>

</fieldset>

<br>

<fieldset>
<legend>Outras Informações</legend>

Estado Civil:
<select name="estado">
    <option>Solteiro(a)</option>
    <option>Casado(a)</option>
    <option>Divorciado(a)</option>
</select><br><br>

Hobbies:<br>
<input type="checkbox"> Música<br>
<input type="checkbox"> Esporte<br>
<input type="checkbox"> Leitura<br>

</fieldset>

<br>

<button type="submit">Enviar</button>
<button type="reset">Limpar</button>

</form>

<br>
